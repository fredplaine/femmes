            const sections = [
    {

        { character: "Brouhaha en voix off", text: "20 ans - 20 ans - 20 ans", gender: "male", isPresident: false },
        { character: "Mathilde Collignon", text: "20 ans ! L’avocat général, du haut de son estrade, a réclamé 20 ans.Et comme si ça ne suffisait pas, il a ajouté “assorti d’une peine de sûreté de 12 ans”", gender: "female", isPresident: false },
        { character: "L’ Avocat Général", text: "Ce procès est avant tout le procès de la barbarie.", gender: "male", isPresident: false },
        { character: "Mathilde Collignon", text: "20 ans ! Son réquisitoire a peut-être duré, quoi, 45 minutes ? Ça fait combien de jours de prison par minute, ça ? Alors, 20 fois 365, ça fait… 7 300 jours. “Mathilde, pour réussir ta vie, il faut savoir compter vite et juste.” Il serait content, mon père. J’ai bien réussi ma vie. Alors, 7 300 jours divisés par 45 minutes, ça fait à peu près…160 jours. Ah oui, un peu plus de 5 mois de prison par minute de réquisitoire. Ça va, c’est bien payé !", gender: "female", isPresident: false },
        { character: "L’ Avocat Général", text: "Cette femme n’appartient plus à notre civilisation. Elle s’en est exclue.", gender: "male", isPresident: false },
        { character: "Mathilde Collignon", text: "20 ans. J’ai peur. Pour la première fois depuis l’agression, j’ai peur. Pourtant, j’ai pas tremblé quand il a fallu régler le compte à ces deux salopards. Et puis,mise en examen, détention provisoire, le tout sans trembler. Ils n’ont eu que ce qu’ils méritaient.Mais là, oui, là,j’ai peur.", gender: "female", isPresident: false },
        { character: "L’ Avocat Général", text: "un monstre froid, calculateur, incapable de repentir et privé de conscience.", gender: "male", isPresident: false },
        { character: "Mathilde Collignon", text: "20 ans. Mes crimes sont théoriquement passibles de 30 ans de prison.Mais mon avocat s’est voulu… rassurant: “ L’avocat n’ira pas jusque-là. Vous êtes primo-criminelle ; ça jouera en votre faveur. Il réclamera entre 5 et 20 ans. Dans le pire des cas, 20 ans.", gender: "female", isPresident: false },
        { character: "L’ Avocat Général", text: "C’est pourquoi je requiers, à l’encontre de l’accusée, 20 ans de réclusion criminelle.", gender: "male", isPresident: false },
        { character: "Mathilde Collignon", text: "20 ans! 20 ans, ben voilà.C’est le pire des cas. Moi, je m’étais préparée mentalement à 10. Avec mes 3 ans de détention provisoire et en misant sur une peine divisée par 2 pour conduite exemplaire, je sortais dans…deux ans ….et demi,maximum. Constance aurait 14 ans et Julie aurait 12 ans. Mais là…", gender: "female", isPresident: false },
        { character: "Le Président", text: "Madame Mathilde Collignon, avez-vous quelque chose à ajouter pour votre défense ?", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "Oui! Monsieur le Président, je vous remercie. Mesdames et messieurs les jurés, j’aurais dû avoir foi en la justice de mon pays au lieu de me faire réparation moi-même. [Bla bla bla …. Bla bla bla ] J’ai été agressée, alors j’ai réagi.Mal, ça, oui, je le reconnais.Vous pouvez me condamner ; j’y suis prête. Mais en me condamnant, vous condamnez aussi Constance et Julie. Ce sont mes deux filles. Elles grandiront sans leur mère. Je vous remercie.", gender: "female", isPresident: false },
        { character: "Le Président", text: "Mesdames et messieurs les jurés, nous allons nous rendre dans la salle des délibérations. L’audience est suspendue.", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "on a tous une idée déformée de la justice.Mais on n’est pas dans un film, là. Non,là, on est dans la vie. On est dans MA vie. Et puis, on n’est pas en Amérique, on est en France. [Bla bla bla … bla bla bla]. Ils ont du mal à se sentir légitimes. Ils se sentent écrasés par le décorum et ils ne se permettent pas de contredire les magistrats", gender: "female", isPresident: false },
        { character: "Le Président", text: "Mesdames et Messieurs les jurés, vous venez d’assister à l’audience. Votre devoir, maintenant, est de livrer votre intime conviction.", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "Les deux avocats de la partie civile savent bien que le président et ses deux assesseurs auront à cœur de faire respecter le droit. Ils feront pencher la balance en faveur de la culpabilité. Il leur suffit de convaincre trois jurés sur six, et je serai condamnée. C’est une formalité.", gender: "female", isPresident: false },
        { character: "Le Président", text: "Monsieur le premier juré,", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "Oui ?", gender: "male", isPresident: false },
        { character: "Le Président", text: "venez prendre place à mes côtés, je vous prie. Les autres, vous pouvez vous installer où vous voulez.", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "Est-ce que je dois présider la séance ?", gender: "male", isPresident: false },
        { character: "Le Président", text: "Ah, non non non! Vous regardez trop la télé.", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "Pardon, je savais pas.", gender: "male", isPresident: false }
      ]
    },
    {
      title: "S.2",
      lines: [
        { character: "Le Président", text: "Ne vous inquiétez pas. Vous n’êtes pas le seul. Votre fonction ne procure en réalité que peu de prérogatives. Au moment des votes, c’est vous qui comptez les bulletins.C’est tout .", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "Ah bon.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Mais vous avez tout de même le privilège d’être assis à côté de moi.", gender: "male", isPresident: true },
        { character: "Le Juré Postier", text: "et c’est vous qui allez annoncer le résultat des délibérations à l’accusé.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Eh bien, vous voyez, vous n’êtes pas le seul à regarder la télé…Non, Madame, ce n’est pas lui. En France, il n’y a que le président qui peut s’adresser directement au public d’une salle d’assises. Notre ami, premier juré, restera muet comme vous tous, tenus par le secret du délibéré. Encore un mot sur la forme.Merci de ne pas m’appeler « Votre Honneur ». Restons simples, appelez-moi juste « Monsieur le Président ».", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "Moi, j’aimais le sexe. Je ne devrais pas dire ça. C’est à croire que je ne retiens aucune leçon. Avouer aimer le sexe, pour une femme, même en 2025, malgré toutes les libérations du monde, c’est quand même … [Bla bla bla …. Bla bla bla ] … comme une bonne mère de famille. Mais j’avais écrit que j’en avais envie. Alors là, changer d’avis en cours de route, ben, c’est plus possible. Tous les noms du monde, crier, hurler, ils ne valaient plus rien. J’ai fait trois ans de prison. Je vais peut-être en faire 17 de plus. Tout ca? parce que j’ai eu envie de baiser.", gender: "female", isPresident: false },
        { character: "Le Président", text: "Tout le monde est bien installé ? Oui? Merci. Bien, avant de commencer, je voudrais vous relire le serment que vous avez prêté au début du procès. Vous jurez et promettez d’examiner avec l’attention la plus scrupuleuse les charges qui seront portées contre Mathilde Collignon; de ne trahir ni les intérêts de l’accusée, ni ceux de la société qui l’accuse, ni ceux des victimes, de vous décider suivant votre conscience et votre intime conviction avec l’impartialité et la fermeté qui conviennent à un homme probe et libre.", gender: "male", isPresident: true },
        { character: "Le Jurée Pharmacienne", text: "Un homme probe et libre ou une femme…", gender: "female", isPresident: false },
        { character: "Le Président", text: "ou une femme. Mesdames et Messieurs les jurés, notre délibéré va se dérouler en deux temps. Nous allons commencer par une discussion, suivie d’un vote concernant la culpabilité de l’accusée. Au moment du vote, vous inscrivez « oui » ou « non » sur l’un des bulletins devant vous. Oui, coupable. Non, non coupable ou doute. Vous voyez, ce n’est pas compliqué. Un verdict de culpabilité n’a pas besoin de recueillir l’unanimité. Il repose sur une majorité des deux tiers. Nous sommes 9, donc 6 voix suffisent. Si le vote est positif, nous aurons une autre discussion pour définir la peine. Il est très important que le débat sur la culpabilité ne soit pas pollué par la discussion sur la peine. Il s’agit de 2 discussions bien distinctes. Est-ce que jusque-là tout est clair ?", gender: "male", isPresident: true },
        { character: "Les jurés (tous ensemble)", text: "Oui….très clair….", gender: "male", isPresident: false },
        { character: "Le Président", text: "Bon. Je vous propose quelques règles pour notre discussion. Je vais vous demander de vous exprimer à tour de rôle dans le respect et la courtoisie. On s’écoute, on ne se coupe pas la parole. Nous sommes 9 parce qu’on prend de meilleures décisions ensemble qu’individuellement, mais aucun d’entre nous ne détient la vérité. Je crois, mesdames et messieurs, qu’un bon verdict est un verdict que l’on pourra délivrer à l’accusée en la regardant dans les yeux, tous ensemble, sans que l’un de nous regarde la pointe de ses chaussures. Si nous arrivons à faire ça, oui, nous aurons fait notre travail. Nous aurons rendu la justice.", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "J’en peux plus ! Ça vient juste de commencer et déjà, j’en peux plus! Combien de temps ça va durer? Il paraît qu’un délibéré dure rarement plus de 2 heures. Sauf s’il y a plusieurs accusés ou s’ils ont un casier judiciaire important, parce que dans ce cas-là, … [Bla bla bla …. Bla bla bla ] J’ai oublié de lui dire merci. faudrait peut-être que je lui fasse livrer des chocolats. Non, il a ajouté “avec préméditation”pour que la peine passe de 10 à 15 ans. Alors, bon, du coup, il ira se gratter pour les chocolats.", gender: "female", isPresident: false },
        { character: "Le Président", text: "une dernière précision avant le premier tour de table. Les actes de torture et de barbarie ne sont pas décrits avec précision dans le code pénal, ce qui nous laisse une grande marge d’interprétation. Dans ce domaine, la jurisprudence permet de… Tout le monde sait ce qu’est la jurisprudence ?", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "Oui, moi je sais !", gender: "male", isPresident: false },
        { character: "Le Président", text: "Bien. La jurisprudence permet de…", gender: "male", isPresident: true },
        { character: "La Jurée Laurence", text: "Pardon. Moi, je dirais qu’il me semble que je sais, mais je veux bien qu’on nous réexplique. Juste pour être sûre, je dirais.", gender: "female", isPresident: false },
        { character: "Mathilde Collignon", text: "Bon! Écoutez, je vais vous aider, mesdames et messieurs les jurés ! Parce que, franchement, il n’y a rien de compliqué là-dedans. Alors, Mathilde Collignon est coupable. [Bla bla bla … bla bla bla] Allez! Hop, on n’en parle plus. Emballé, c’est pesé. Mathilde Collignon, elle sort libre. Générique de fin et l’audience est levée. Parce que sinon, 20 ans, dont 12 incompressibles, c’est, en fait, pas possible.", gender: "female", isPresident: false },
        { character: "Le Président", text: "La jurisprudence, c’est l’ensemble des décisions déjà rendues par des tribunaux sur un sujet donné. Ça nous éclaire pour prendre une décision. Vous avez compris ?", gender: "male", isPresident: true },
        { character: "La Jurée Laurence", text: "oui. Je crois que je savais déjà, en fait. Je m’appelle, je dirais, Laurence. Laurence Durouie. Je suis agent communal à la ville de Rennes. Je m’occupe des espaces verts. Je ne suis pas jardinière, non. C’est moi qui gère l’équipe. Je n’ai pas d’enfants. Le drame de ma vie. Dieu, je dirais, a préféré que je m’occupe des autres plutôt que de moi. Alors, du coup, je suis bénévole à Sourire d’Enfants. C’est une association qui s’occupe des enfants handicapés. Je ne voulais pas être tirée au sort. Non, ah, ça non! Quand j’ai entendu mon nom, j’ai marché trèèèèès lentement vers le président pour bien laisser le temps aux avocats de dire “ récusée”: ils l’ont pas dit!", gender: "female", isPresident: false },
        { character: "Le Président", text: "Donc, dans la jurisprudence, les éléments les plus souvent retenus pour caractériser la torture et la barbarie sont la cruauté,la sauvagerie, la volonté d’accomplir des actes d’une gravité exceptionnelle et le désir de faire souffrir la victime. Qui veut prendre la parole… (Il regarde tout le monde, personne ne commence.) ...et nous donner ses premières impressions ?", gender: "male", isPresident: true },
        { character: "Le Juré Olivier", text: "Allez, je me lance ! Je m’appelle Olivier, Olivier Cordier. J’ai 41 ans. Je suis responsable du service client pour une entreprise d’entretien de chaudière à Saint-Grégoire. C’est pas loin de Rennes. Je suis célibataire sans enfant. Je n’ai pas vraiment le temps, en fait, parce que je travaille trop. Quand j’ai reçu ma convocation pour venir ici, d’abord, j’ai eu peur. Une lettre recommandée, c’est toujours des emmerdes. En plus, avec le drapeau bleu, blanc,rouge,moi, j’ai tout de suite pensé que c’était une lettre des impôts. Remarquez, c’est pas mieux. En ce qui concerne mon employeur, il n’était pas vraiment ravi que je sois absent, mais il m’a donné son autorisation, à condition…bref, cette histoire, ça va me coûter au moins 400 euros. Moi, je pense qu’elle est coupable. Elle a avoué son crime pendant la garde à vue. Elle a confirmé que c’était elle pendant le procès. Et, d’ailleurs, la seule chose que réclame son avocat , c’est…comment il l’a dit, déjà ?", gender: "male", isPresident: false },
        { character: "Un juré", text: "La clémence", gender: "male", isPresident: false }

        { character: "Le Juré Postier", text: "elle a deux filles.C’est vrai que ses enfants la méritent peut-être, notre clémence.", gender: "male", isPresident: false },
        { character: "Le Premier Juré", text: "on n’est pas là pour être clément. On est là pour être juste", gender: "male", isPresident: false },
        { character: "Le Juré Postier", text: "on est là pour rendre la justice, et la clémence peut faire partie de la justice.", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "Oui, mais on se fiche de ses enfants! Pardon, pardon. Bien sûr que non, on ne s’en fiche pas de ses enfants. Elle est quand même gonflée de nous demander de penser à ses filles. Elle y a pensé,elle, avant de commettre son crime? Elle a pensé qu’elles allaient être privées de leur mère pendant qu’elle serait en prison? Ben non !", gender: "female", isPresident: false },
        { character: "Le Premier Juré", text: "Très juste", gender: "male", isPresident: false },
        { character: "Mathilde Collignon", text: "Mon avocat ne voulait pas que je parle de mes enfants, mais moi je n’ai pas écouté.Dans mon acte de contrition, je devais regretter de m’être fait justice moi-même au lieu de m’en remettre aux institutions de mon pays et regretter « l’immense douleur causée aux parties civiles ». Là, c’était un petit peu trop me demander.", gender: "female", isPresident: false },
        { character: "Le Juré Olivier", text: "En tout cas, son avocat, il ne demande pas un acquittement pur et simple. Non, il n’y a aucun doute, c’est elle qui l’a fait. Maintenant, moi, je me demande si elle est pas un peu dérangée.", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "Ça, c’est sûr!", gender: "female", isPresident: false },
        { character: "Le Juré Olivier", text: "les experts disent que non. Mais une personne normale, elle n’aurait jamais fait un truc pareil ! Alors, je comprends qu’elle ait eu la rage après ce qui lui est arrivé; je comprends qu’elle ait eu envie de se venger, mais de là à faire ce qu’elle a fait. Non, vous trouvez pas ? C’est pour ça que je pense qu’elle est un peu folle. Voilà.", gender: "male", isPresident: false },
        { character: "Le Premier assesseur", text: "si je peux me permettre. Nous devons tous ici partir du principe qu’elle n’est pas folle. Et tout simplement, parce qu’en France, on ne juge pas les fous, monsieur.À ce propos, vous me donnez l’occasion de vous rappeler les conclusions de l’expertise psychiatrique : aucune abolition du discernement au moment des actes reprochés à l’accusée. Bonjour, je m’appelle Paul Delorme.J’ai 32 ans, je suis juge aux affaires familiales et je suis également assesseur dans ce procès. Moi, je sors tout juste de l’école nationale de magistrature, donc je n’ai aucune expérience des assises. En revanche, je suis incollable sur n’importe quel texte de loi. Je vais vous dire: je pense exactement le contraire. Pour moi, Mathilde Collignon savait parfaitement ce qu’elle faisait. Je vous donnerai mon avis personnel plus tard, pardon.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Merci de ce rappel, Monsieur le Premier assesseur. Effectivement, très utile. Et vous avez raison. Vous donnerez votre avis plus tard. Je préfère que les jurés parlent en premier et que mes deux assesseurs ne prennent la parole qu’à la fin. Qui veut poursuivre ?", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "Moi, je veux bien. Parce que je suis comme vous, monsieur le juge ; je ne crois pas qu’elle soit folle. Par contre, elle est dangereuse.", gender: "male", isPresident: false },
        { character: "Le Juré Olivier", text: "L’un n’empêche pas l’autre.", gender: "male", isPresident: false },
        { character: "Le Premier Juré", text: "Laissez-moi finir, s’il vous plaît.", gender: "male", isPresident: false },
        { character: "Le Juré Olivier", text: "pardon", gender: "male", isPresident: false },
        { character: "Le Premier Juré", text: "Pour moi, elle est coupable. Non? Franchement, si ce n’est pas de la barbarie, c’est quoi ?", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "Mais oui, évidemment qu’elle est coupable!", gender: "female", isPresident: false },
        { character: "Le Premier Juré", text: "Si chacun fait sa justice, comme ça, c’est…le Far West ! Je ne veux pas minimiser ce qu’elle à subi, non, mais même si c’est vrai, même si les deux victimes sont en fait des salauds, rien ne peut justifier ce qu’elle leur a fait. On ne répond pas à l’horreur par l’horreur. Pour moi, elle mérite la peine maximale. Je me présente: Je m’appelle Henri. Henri de Vassou. Je suis prof de gym au lycée Descartes. J’ai 51 ans. Je suis marié et père de 4 enfants. J’ai mis un nœud papillon parce que je prends mon rôle de 1er juré très au sérieux. On me demande de juger quelqu’un et c’est bien ce que j’ai l’intention de faire.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Attention. Je vous rappelle que nous ne parlons pas de peine pour l’instant. Cette discussion doit se focaliser sur la culpabilité.", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "si c’est juste sur la culpabilité, je vote coupable!", gender: "male", isPresident: false },
        { character: "Le Président", text: "On avait bien compris, merci. Qui veut continuer?", gender: "male", isPresident: true }
      ]

    {

        { character: "Le Jurée Pharmacienne", text: "Je veux bien, Monsieur Le Président. Je m’appelle Myriam Belhaj. J’ai 28 ans. Je suis docteure en pharmacie. Je vis en couple. On a un bébé, un petit garçon de 10 mois qui s’appelle Maxime. Je suis très fière d’être là. Bon, d’abord parce que je suis une passionnée de polars et d’affaires judiciaires, mais surtout parce que je suis une petite fille de Harkis. Être ici, c’est vraiment une reconnaissance républicaine. Ça prouve que je suis une vraie Française. Je suis d’accord avec ce qui vient d’être dit. Je ne pense pas qu’elle soit folle. Je dirais même qu’elle a agi de manière rationnelle. Elle s’est rendue compte qu’elle ne pourrait pas compter sur la justice pour obtenir réparation. Elle a décidé de se venger elle-même. Ça me semble un acte réfléchi, pas une pulsion soudaine ni une illumination.Et je vais sûrement vous choquer, mais moi, j’aurais tendance à lui donner raison. Et d’ailleurs, les faits sont là.", gender: "female", isPresident: false },
        { character: "La Jurée Laurence", text: "Je suis absolument d’accord avec vous, Madame ; c’est un acte réfléchi. Absolument, oui, tout à fait. Et justement, c’est ça qui le rend encore plus odieux.", gender: "female", isPresident: false },
        { character: "Le Jurée Pharmacienne", text: "Attendez, je continue. Les faits sont là et les deux agresseurs n’ont pas été poursuivis. Donc, finalement, c’est quoi…", gender: "female", isPresident: false },
        { character: "La Jurée Laurence", text: "en admettant, je dirais, qu’elle ait été vraiment violée.", gender: "female", isPresident: false },
        { character: "Le Jurée Pharmacienne", text: "Bon, j’aimerais pouvoir finir ma phrase sans être interrompue", gender: "female", isPresident: false },
        { character: "Le Président", text: "Bien sûr, finissez, madame. Rappelez-vous : nous sommes là pour débattre, mais respectons les positions de chacun et évitons de nous couper la parole.", gender: "male", isPresident: true },
        { character: "Le Jurée Pharmacienne", text: "merci. Je disais donc que la suite des événements lui a donné raison.", gender: "female", isPresident: false },
        { character: "Le Juré Olivier", text: "C’est vrai. Sans elle, ses agresseurs seraient restés impunis.", gender: "male", isPresident: false },
        { character: "Le Jurée Pharmacienne", text: "Exactement ! Et je ne comprends d’ailleurs toujours pas pourquoi son avocat n’a pas invoqué la légitime défense. (protestations de certains jurés.) Enfin, pour moi, c’est d’abord une victime avant d’être une criminelle !", gender: "female", isPresident: false },
        { character: "Le Second Assesseur", text: "Excusez-moi, monsieur le Président, j’ai bien noté que vous préféreriez que nous parlions après les jurés, mais là,c’est juste pour rappeler la loi. Je peux ?", gender: "male", isPresident: false },
        { character: "Le Président", text: "Bien sûr. Faites.", gender: "male", isPresident: true },
        { character: "Le Second Assesseur", text: "Vous pouvez la trouver non coupable ; c’est votre droit le plus strict, mais vous ne pouvez pas invoquer la légitime défense. Le droit est très clair sur ce point. Il doit y avoir proportionnalité et simultanéité. Je laisse à votre appréciation la question de la proportionnalité. Oui, c’est discutable. Mais il n’y a pas eu simultaneité. Nous ne sommes pas complètement libres dans cette pièce. Nous devons tenir compte des textes, vous comprenez ?", gender: "male", isPresident: false },
        { character: "Le Jurée Pharmacienne", text: "Oui, oui, je comprends très bien. Alors, ce n’est peut-être pas de la légitime défense d’après la définition de la loi, mais je trouve que c’était une défense légitime. Pour moi, elle n’est pas coupable.", gender: "female", isPresident: false },
        { character: "Le Juré Postier", text: "Oui! La question que l’on doit se poser est : peut-on la condamner alors que ses violeurs s’en sortent ?", gender: "male", isPresident: false },
        { character: "Le Jurée Pharmacienne", text: "Pour moi, non! Ce n’est pas comme ça que je vois la République !", gender: "female", isPresident: false },

        { character: "Le Juré Olivier", text: "Oui, a bien compris de quel côté vous étiez…", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "Évidemment, elle est coupable de torture! Et toutes ses excuses de viol, excusez-moi pour la franchise, mais je dirais que c’est n’importe quoi. Vous vous souvenez des messages qu’elle envoyait ? C’est quand même elle qui est allée chez lui !", gender: "female", isPresident: false },
        { character: "Le Premier Juré", text: "Personne ne l’a forcé !", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "Merci! Aujourd’hui, de toute façon, si on écoutait toutes ces féministes, je dirais que tous les hommes c’est rien que des violeurs. Mais un homme ne peut plus nous draguer. Je ne dis pas ça pour moi, je suis mariée et fidèle, mais un homme ne peut plus vouloir coucher avec nous sans tout de suite se faire accuser de harcèlement.", gender: "female", isPresident: false }
      ]

      title: "S.5",
      lines: [
        { character: "Le Premier Juré", text: "Ça, c’est vrai !…ça devient…", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "Mais bien sûr ! En plus, elle l’a dit elle-même : elle avait envie de sexe. Je vous jure! Ce n’est quand même pas très moral pour une femme d’avoir envie… ben oui, Madame ! Je suis désolée, mais on n’est pas des animaux ! On n’est pas des chiens. On n’est pas des lapins. Elle avait rendez-vous et maintenant, elle vient se plaindre qu’elle s’est fait violer. Oh, non, non, non…Je ne suis pas d’accord avec ça, moi! C’est trop facile. Je suis désolée de vous dire ça mais elle a pris un risque et…", gender: "female", isPresident: false },
        { character: "Le Jurée Pharmacienne", text: "Mais on ne peut pas laisser dire ça ! Vous allez parler de la manière dont elle était habillée aussi ? (Grosse engueulade)", gender: "female", isPresident: false },
        { character: "Le Président", text: "S’il vous plaît. Revenons à Mathilde Collignon! La seule question qui doit nous occuper pour l’instant et celle sur laquelle je vous demande de vous concentrer est : est-elle coupable d’acte de torture et de barbarie ? Rien d’autre ! Mesdames, vous ne vous êtes pas encore exprimées. Voulez-vous nous donner votre avis ?", gender: "male", isPresident: true },
        { character: "La jurée Adrienne", text: "Moi, je pense qu’ils ont eu que ce qu’ils méritaient, Ces deux salopards! Adrienne Huet, 57 ans, mariée et trois garçons. Aide-soignante à l’EPADH du Clos St Martin. C’est dur. S’occuper des résidents, les voir mourir. Des fois, il y en a ; ils n’ont même pas le temps de voir leur famille avant de mourir. Alors moi, j’ai besoin de me changer les idées. Je fais partie d’une troupe de théâtre amateur. C’est sympa parce qu’on joue des comédies. Moi, j’en ai marre des tragédies. Et ce procès-là, c’est vraiment une tragédie ! Non seulement ce sont des porcs, mais en plus, ils sont complètement cons : croire qu’elle avait aimé ça!!! Qu’elle en voulait encore! Non, mais on rêve ? Pour moi, il est hors de question de condamner une femme que personne n’aurait écoutée. Le jour où les violeurs seront punis, ce jour-là, oui, peut-être qu’il faudrait la condamner, mais aujourd’hui, on ne peut pas.", gender: "female", isPresident: false },
        { character: "Le Juré Olivier", text: "Elle a raison ! Elle avait pas d’autre choix, Mathilde Collignon!", gender: "male", isPresident: false },
        { character: "La jurée Adrienne", text: "Et moi je dis qu’elle à protégé les deux autres femmes de ces deux salauds. Mais c’est vrai! Combien de femmes, elle a sauvées ? D’après vous, ils en auraient violé combien d’autres si on avait continué à les laisser faire ? Moi, je refuse de condamner cette femme. Les mecs, ils réfléchiront peut-être à deux fois avant de sortir leur zizi sans qu’on leur demande.", gender: "female", isPresident: false },
        { character: "Le Premier assesseur", text: "Madame, j’entends tout à fait votre colère et je comprends aussi", gender: "male", isPresident: false },
        { character: "La jurée Adrienne", text: "Non, vous pouvez pas comprendre, vous êtes un homme!", gender: "female", isPresident: false },
        { character: "Le Premier Assesseur", text: "Je voulais juste préciser encore une fois, Madame, que nous devons d’abord nous prononcer sur sa culpabilité. Vous dites que vous ne souhaitez pas qu’elle soit condamnée. Très bien. Mais au moment de la discussion sur la peine et à ce moment-là, seulement, vous pourrez dire que vous souhaitez une peine symbolique. Ce n’est pas incompatible, c’est même votre droit. En revanche, dire que Mathilde Collignon n’est pas coupable, ça, ce n’est juste pas raisonnable parce que simplement, ce n’est pas vrai. La réalité..", gender: "male", isPresident: false },
        { character: "La jurée Adrienne", text: "la réalité, c’est qu’elle ne pouvait pas faire autrement!", gender: "female", isPresident: false },
        { character: "La Jurée Laurence", text: "elle ne pouvait pas faire autrement ?", gender: "female", isPresident: false },
        { character: "La jurée Adrienne", text: "Non!", gender: "female", isPresident: false },
        { character: "Le Premier Juré", text: "Mais enfin, c’est du sadisme ce qu’elle leur a fait.", gender: "male", isPresident: false },
        { character: "La jurée Adrienne", text: "Elle n’a fait que se défendre.", gender: "female", isPresident: false },
        { character: "Le Premier Juré", text: "Ah non, non, non ! Ils dormaient quand elle s’est occupée d’eux. (Brouhaha - Ca discute - ca s'invective)", gender: "male", isPresident: false },
        { character: "Le Président", text: "Du calme, du calme, je vous en prie. Bon, finissons le tour de table. (Au postier) Monsieur, quel est votre avis?", gender: "male", isPresident: true },
        { character: "Le Juré Postier", text: "Pour tout vous dire, j’hésite. C’est le mot “barbare”qui me gêne. Quand les talibans lapident une femme adultère, je me dis que ce sont des barbares. Quand les hommes violent des femmes, là aussi, ce sont des barbares. [Bla bla bla …. Bla bla bla ]. Je suis postier. Enfin, j’étais postier 37 ans. Maintenant, je suis à la retraite. [Bla bla bla … bla bla bla]. Je me suis toujours dit que j’aimerais y être un jour et bien là, c’est fou, j’y suis. Je doute. Vous avez dit, Monsieur le Président, que si on doutait, on devait dire non sur notre bulletin de vote. C’est bien ça ?", gender: "male", isPresident: false },
        { character: "Le Président", text: "Oui, Monsieur, vous avez très bien compris.", gender: "male", isPresident: true },
        { character: "Le Premier assesseur", text: "Pardon, mais de quoi doutez-vous, monsieur? Vous doutez que Mathilde Collignon ait commis ces crimes ? OU vous doutez que ces crimes relèvent de la barbarie?", gender: "male", isPresident: false },
        { character: "Le Juré Postier", text: "Je suis comme tout le monde, évidemment qu’elle l’a fait! Je doute simplement que ce soit à nous de dire si c’est de la barbarie ou de la torture vu ce qui lui est arrivé. Voilà, c’est tout.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Avez-vous autre chose à ajouter?", gender: "male", isPresident: true },

    {
      title: "S.6",
      lines: [
        { character: "Le Président", text: "Merci beaucoup. Monsieur l’assesseur, à vous maintenant. Vous avez la parole. Qu'avez-vous à dire?", gender: "male", isPresident: true },
        { character: "Le Premier assesseur", text: "Rien de bien long, Monsieur le président. Si les crimes de Mathilde Collignon ne relèvent pas de la barbarie, alors, pardon, mais je me demande jusqu’où il faut aller pour obtenir la qualification de barbare. Jusqu’où ? Donc, évidemment, pour moi, Monsieur le président, elle est coupable. Et sans aucune hésitation.", gender: "male", isPresident: false },
        { character: "Le Président", text: "(Vers le Premier assesseur) Merci. (Vers le second assesseur) Monsieur l’assesseur ?", gender: "male", isPresident: true },
        { character: "Le Second Assesseur", text: "Je m’appelle Laurent Verch. Je suis juge d’instruction depuis 15 ans. Ce n’est pas la première fois que je remplis ce rôle d’assesseur. On m’a déjà demandé de présider des assises, mais j’ai refusé. Je préfère les enquêtes, le terrain, la collaboration avec les services de police et la quête de la vérité. Je voudrais rappeler ici à l’ensemble du jury les dommages physiques et psychologiques infligés aux victimes. Et comme vous le disiez en ouverture, Monsieur le Président, nous sommes bien en présence de la volonté d’accomplir des actes d’une gravité exceptionnelle et du désir de faire souffrir les victimes. Pour moi, ça ne fait aucun doute : elle est coupable d’acte de torture et de barbarie.", gender: "male", isPresident: false },
        { character: "Mathilde Collignon", text: "C’est long! Mon Dieu, comme c’est long ! Ça n’en finit pas. Toujours pas de verdict. Je sais pas si c’est bon signe ou si c’est mauvais signe. Ça fait trois ans que je me demande : mais comment j’ai pu faire ça ? Comment j’ai pu me laisser envahir par une telle haine, par un tel appétit de vengeance? Sans penser aux conséquences.", gender: "female", isPresident: false },
        { character: "Le Président", text: "à moi de conclure. Eh bien, je dois commencer par vous dire que je m’attendais à un délibéré compliqué. Mais je pensais que ce serait au moment de la discussion sur la peine, pas sur la culpabilité. Les deux interventions de Marc Couzy et d’Adrienne Huet me donnent à réfléchir, bien sûr. Mais je suis investi d’une mission: faire respecter le droit. Comme vous, je conviens que la justice a probablement failli en ne poursuivant pas Jérôme Dichaud et Benoît Rigol. Comme vous, je suis révolté de les voir libres, car oui, j’accorde foi aux propos de Mathilde Collignon. Quoi qu’elle ait pu dire ou écrire avant ce rendez-vous, et quelle que soit la façon dont elle était vêtue, à partir du moment où elle a dit non, c’est ce non qui aurait dû prévaloir. Dès lors que ces deux hommes n’ont pas respecté ce NON et ont employé la contrainte. Oui, cette femme a été violée. Et je comprends que l’émotion soit vive.Mais nous devons faire abstraction de l’émotion pour vivre en société. L’émotion et la justice ne font pas bon ménage. Je ne sais plus qui a mentionné le Far West.", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "C’est moi!", gender: "male", isPresident: false },
        { character: "Le Président", text: "Oui, voilà! Eh bien, nous ne voulons pas de cela. Nous avons le privilège de vivre en démocratie et cette démocratie repose sur le respect des lois que nous sommes collectivement chargés de faire appliquer tous ensemble. Si j’écoute ma raison, ce que j’ai lu et entendu au cours du procès et la nature des crimes qu’elle a commis, tout concourt à me convaincre de sa culpabilité pour acte de torture et de barbarie. Est-ce que quelqu’un veut ajouter quelque chose ? (une jurée se mouche bruyamment) Ou bien, pouvons-nous considérer que nous sommes prêts à voter ? ( il se lève) Je rappelle la question: Mathilde Collignon est-elle coupable d’acte de torture et de barbarie ? Vous inscrivez OUI ou NON sur le bulletin (les jurés écrivent). La règle est claire: il faut au moins 6 voix pour la culpabilité. Allons-y", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "Comment j’ai pu être aussi bête? Prendre le risque de tout perdre juste pour ne pas les laisser s’en sortir. Ça a été plus fort que moi. Ils m’ont piétinée. Ils m’ont humiliée. Ils m’ont salie. Je ne pouvais pas laisser passer. Il fallait que je leur donne une bonne leçon. Mais je suis qui, moi, pour donner des leçons ? J’aurais mieux fait de rentrer dans le rang. De faire comme toutes les femmes qui continuent à vivre en cachant leurs souffrances. Enfin, j’ai quand même eu une petite consolation. C’est que j’avais raison, depuis le début. Ils n’ont pas été poursuivis…..non, ils sont libres de leurs mouvements. Alors, ils sont un petit peu diminués. Oui, ça, c’est vrai. Mais enfin, quand même, ils sont libres.", gender: "female", isPresident: false },
        { character: "Le Président", text: "Monsieur le premier juré, allez-y, je vous en prie, lisez à voix haute sous le contrôle de tout le monde.", gender: "male", isPresident: true },
        { character: "Le Premier Juré", text: "Oui, Oui, Non, Non, Oui, Non, Non", gender: "male", isPresident: false },
        { character: "Le Président", text: "On s’arrête là.", gender: "male", isPresident: true },
        { character: "La Jurée Laurence", text: "Ben, on regarde pas les autres votes ?", gender: "female", isPresident: false },
        { character: "Le Président", text: "On a 4 non ; inutile de lire les autres bulletins. Il est impossible de réunir 6 Ouis.Par conséquent, l’acusée est déclarée non coupable du chef d’accusation d’acte de torture et de barbarie.", gender: "male", isPresident: true },
        { character: "La Jurée Laurence", text: "Ah, non,non,non, ce n’est pas possible. On ne peut pas laisser ça faire !", gender: "female", isPresident: false },
        { character: "Le Premier Juré", text: "Mais enfin, elle est coupable! Même elle, elle le dit.", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "mais vous vous rendez compte de la réaction des victimes et de leurs familles?", gender: "female", isPresident: false },
        { character: "Le Premier Juré", text: "Et la presse? Alors là, les médias vont nous tomber dessus!", gender: "male", isPresident: false },
        { character: "La Jurée Laurence", text: "sans parler des réactions politiques. Mais enfin, voyons!", gender: "female", isPresident: false },
        { character: "Le Premier assesseur", text: "Le mieux serait de revoter.", gender: "male", isPresident: false },

    {
      title: "S.7",
      lines: [
        { character: "Le Premier Juré", text: "mais parce qu’elle est coupable, tout simplement.", gender: "male", isPresident: false },
        { character: "Le Premier assesseur", text: "Mais vous ne vous rendez pas compte des conséquences! Avec une accusée qui avoue…on est face à des actes monstrueux!", gender: "male", isPresident: false },
        { character: "Le Jurée Pharmacienne", text: "Non, mais quand même, si les femmes ….", gender: "female", isPresident: false },
        { character: "La Jurée Laurence", text: "Oh, arrêtez avec les femmes! (Engueulade)", gender: "female", isPresident: false },
        { character: "Le Président", text: "ça suffit! Nous sommes dans une salle de délibérés! Pas dans un meeting ni sur un plateau de télévision. Il n’y aura pas de revote, Monsieur Delorme. (A Cordier et Laurence) Et pas de débat après le débat.", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "(Marie) Depuis mon divorce, j’avais pris l’habitude de me connecter sur Tinder. C’est un site de rencontres. On fait défiler des photos et, quand un mec qui nous plaît, alors là, on le like et, s'il nous like en retour, on matche, voilà. C’est pas plus compliqué que ça. Ensuite, on échange des messages, … [Bla bla bla …. Bla bla bla ] J’ai eu une peur…. animale, viscérale, paralysante. Ils se sont servis de moi. Je les entendais. Ils m’insultaient, ils me tiraient les cheveux, ils m’ont frappée. Et puis ils m’ont forcée. Encore, encore, encore. C’était un déchaînement de haine, de violence, de soumission, d’odeur de sueur, de porcherie. Ils m’ont salie. Partout. Et après, après, c’était le silence.", gender: "female", isPresident: false },
        { character: "Le Président", text: "Bon, allez, 10 minutes de pause. J’autorise exceptionnellement les jurés à sortir de la salle des délibérés. Allez aux toilettes, dégourdissez-vous les jambes et surtout, surtout, changez-vous les idées après ces échanges électriques. J’espère que nous reprendrons dans des dispositions de respect mutuel et d’écoute. On peut faire ça ? (les jurés sortent). Delorme, vous restez; j’ai à vous parler. Monsieur le juge aussi, s'il vous plaît.", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "J’étais toute nue. Je tremblais de peur, de froid, de douleur. Alors vite, partir, quitter cette maison.J’essaie de me relever et là, devant moi, Guichaud, un verre à la main”tiens, Sophie,, je t’ai apporté un verre d’eau.Et il attrape le plaid qui était posé sur le canapé du salon [Bla bla bla …. Bla bla bla ] ...Me purifier de toutes traces de ces salopards. Mais je crois que…j’étais surtout débordée par la haine. Oui, c’est là. C’est à partir de ce moment-là que… que ça a complètement dérapé chez moi.", gender: "female", isPresident: false },
        { character: "Le Président", text: "Il faut absolument que l’on reprenne les choses en main.", gender: "male", isPresident: true },
        { character: "Le Premier assesseur", text: "tout ça, c’est parce qu’ils sont intoxiqués par les réseaux sociaux.", gender: "male", isPresident: false },
        { character: "Le Second Assesseur", text: "Vous êtes sur Facebook, monsieur le président ?", gender: "male", isPresident: false },

        { character: "Le Second Assesseur", text: "Tant mieux pour vous; tant mieux pour la justice. Vous n’êtes pas influencé par des centaines de posts. Mais les jurés sont complètement intoxiqués par ces commentaires: Ils l’avaient bien cherché! Liberté pour Collignon!.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Mais ça devient n’importe quoi! On est censé se forger une intime conviction pendant le procès. Ni avant ni en dehors. Moi, je vais vous dire: je tiens à la contribution du peuple, à la justice de mon pays, mais là, le temps des jurés est peut-être révolu.", gender: "male", isPresident: true },
        { character: "Le Second Assesseur", text: "Oui, c’est possible.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Si on continue comme ça, ce sera la fin des jurys populaires. Ils seront remplacés par des magistrats.", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "J’aurais dû aller chez les flics. Mais avec mon Tinder, mes textos. Je n’avais aucune chance. Alors je suis rentrée chez moi, j’ai libéré la baby-sitter et j’ai pris une douche. La douche la plus longue de l’histoire des douches. Puis, j’ai frotté ma peau. Avec du savon, avec un gant de crin. Je savais que j’effacerais toute preuve physique et toute possibilité d’un recours juridique ultérieur, mais…Consciemment ou inconsciemment, je me dirigeais déjà vers la voie sans issue de la vengeance.", gender: "female", isPresident: false },
        { character: "Le Premier assesseur", text: "Vous avez peut-être raison, mais, Monsieur le Président, là, l’important, c’est de remettre un peu d’ordre dans le délibéré.", gender: "male", isPresident: false },

        { character: "Le Premier assesseur", text: "Pardonnez-moi, monsieur le président, mais c’est quand même vous qui conduisez ce procès, pas moi! Donc, c’est un peu facile de me tenir responsable de la tournure que prennent les événements.", gender: "male", isPresident: false }

        { character: "Le Président", text: "C’est vrai ! Mais il n’est pas question que le procès de Mathilde Collignon soit à l’origine de l’acceptation de la vengeance comme légitime défense. J’ai laissé ce délibéré m’échapper, mais je compte bien reprendre les choses en main, alors, faites un effort, mon vieux! Allez prendre l’air tous les deux. J’espère que vous faites preuve de plus d’empathie aux affaires familiales (les avocats sortent).", gender: "male", isPresident: true },
        { character: "Mathilde Collignon", text: "Je pensais à me venger, mais je ne savais pas comment. Je ne voulais pas qu’ils meurent, non, ça, c’était trop facile.Moi, je voulais qu’ils souffrent. Qu’ils ne passent pas une heure de leur vie sans regretter leur crime. Au début, j’avais pensé leur tatouer sur le torse: « Je suis un gros porc … [Bla bla bla …. Bla bla bla ] … Et je suis partie.Avec le regret quand même de ne pas voir leur tête au réveil quand ils se rendraient compte que Sophie la salope les avaient coupés. J’ai jeté leurs organes sexuels dans les toilettes et j’ai tiré la chasse. Aucune récupération ou reconstruction possible. Adieu.", gender: "female", isPresident: false },
        { character: "Le Président", text: "Bien. Merci à tous et à toutes de reprendre rapidement vos places. Nous avons répondu non à la première question: Mathilde Collignon est-elle coupable d’avoir commis des actes de torture et de barbarie? Il s’agit maintenant pour nous de répondre à la question: Mathilde Collignon est-elle coupable d’actes de violence volontaire avec préméditation ayant entraîné une mutilation ou une infirmité permanente sur les personnes de Jérôme Guichaud et Benoît Riole , dans la nuit du 24 au 25 octobre 2019 ? Qui veut se lancer ?", gender: "male", isPresident: true },
        { character: "Le Second Assesseur", text: "Si vous me le permettez, monsieur le président, j’aimerais partager avec vous la manière dont j’aborde la réponse à cette question. Mathilde Collignon a-t-elle exercé des violences sur les personnes de Jérôme Guichaud et Benoît Riol ? La réponse est oui. Si couper les testicules et le sexe d’un homme sans son accord préalable n’est pas un acte violent, alors qu’est-ce qui est violent ? Ensuite, on nous demande si ces violences étaient volontaires. Alors, à moins d’avoir glissé sur un bistouri et , en essayant de se rattraper. [Bla bla bla … bla bla bla]. Est-ce qu’une repousse est envisageable? En cas contraire, cette infirmité est permanente. Aussi, quand je réfléchis à l’impression qu’ont faite sur ma réserve toutes les preuves rapportées contre l’accusée, je ne me vois pas répondre autrement que par OUI à la question que vous venez de lire, monsieur le président.", gender: "male", isPresident: false },
        { character: "Le Président", text: "Je vous remercie, Monsieur le juge, pour votre intervention et pour avoir réussi à détendre l’atmosphère de cette assemblée. Monsieur Verch a-t-il résumé la position de tout le monde? Avant de passer au vote, est-ce que quelqu’un conteste le fait que les actes de l’accusée relèvent de la violence volontaire? Personne? Bien. Même question concernant la préméditation. Personne non plus. Et sommes-nous tous d’accord sur le fait que les deux victimes présentent chacune une mutilation ou une infirmité permanente? Oui.", gender: "male", isPresident: true },
        { character: "Le Jurée Pharmacienne", text: "Oui, sauf que je ne suis toujours pas convaincue qu’ils fassent les qualifier de victimes, ces deux-là.", gender: "female", isPresident: false },

        { character: "Le Premier Juré  (debout)", text: "OUI, NON", gender: "male", isPresident: false },
        { character: "Le Président", text: "(très énervé) Bon, si le prochain bulletin est un NON, l’accusée sera acquittée alors que tout le monde était d’accord pour dire qu’il y avait eu des violences volontaires préméditées!…Allez-y!", gender: "male", isPresident: true },

        { character: "Mathilde Collignon", text: "Je suis retournée à ma voiture, consciente de laisser derrière moi une scène de crime qui ferait la Une de tous les journaux.J’avais privé de leur masculinité deux mâles dominants. La violée a, à son tour, violé un tabou. À mes yeux, Guichaud et Riol méritaient ce châtiment. Mais moi, est-ce que je méritais de me retrouver au ban de la société ? J’étais soulagée d’avoir fait les gestes proprement, mais je n’éprouvais aucune joie. Cette vengeance ne rendait ma douleur ni plus sage ni plus tranquille. J’avais pas de remords, mais je ne me sentais pas mieux, et la vision de ces deux émasculés me hantait. J’avais fait ça, moi ?", gender: "female", isPresident: false },

        { character: "Le Juré Postier", text: "En 68, j’avais 16 ans et le droit de vote, c’était à 21 ans.", gender: "male", isPresident: false },
